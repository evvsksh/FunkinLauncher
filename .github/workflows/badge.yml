name: CI Badge

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: "GitHub: Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Badge: Create directories"
        run: mkdir -p .github/badges

      - name: "GameBanana: Generate SVG"
        shell: bash
        run: |
          URL="https://gamebanana.com/apiv11/Mod/Index?_nPerpage=1&_sSort=Generic_MostDownloaded&_aFilters[Generic_Game]=8694&_nPage=1"

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" = "200" ]; then
            COLOR="#4b0"
            TEXT="passing"
          else
            COLOR="#e05d44"
            TEXT="failing"
          fi

          cat > .github/badges/gamebanana.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="88" height="20" role="img" aria-label="build: ${TEXT}">
            <title>build: ${TEXT}</title>

            <filter id="blur">
              <feGaussianBlur in="SourceGraphic" stdDeviation="16"/>
            </filter>

            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>

            <clipPath id="r">
              <rect width="88" height="20" rx="3" fill="#fff"/>
            </clipPath>

            <g clip-path="url(#r)">
              <rect width="37" height="20" fill="#555"/>
              <rect x="37" width="51" height="20" fill="${COLOR}"/>
              <rect width="88" height="20" fill="url(#s)"/>
            </g>

            <g
              fill="#fff"
              text-anchor="middle"
              font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
              text-rendering="geometricPrecision"
              font-size="110"
            >
              <text
                aria-hidden="true"
                x="195"
                y="150"
                fill="#010101"
                fill-opacity=".80"
                filter="url(#blur)"
                transform="scale(.1)"
                textLength="270"
              >
                build
              </text>

              <text
                aria-hidden="true"
                x="195"
                y="150"
                fill="#010101"
                fill-opacity=".3"
                transform="scale(.1)"
                textLength="270"
              >
                build
              </text>

              <text
                x="195"
                y="140"
                transform="scale(.1)"
                fill="#fff"
                textLength="270"
              >
                build
              </text>

              <text
                aria-hidden="true"
                x="615"
                y="150"
                fill="#010101"
                fill-opacity=".80"
                filter="url(#blur)"
                transform="scale(.1)"
                textLength="410"
              >
                ${TEXT}
              </text>

              <text
                aria-hidden="true"
                x="615"
                y="150"
                fill="#010101"
                fill-opacity=".3"
                transform="scale(.1)"
                textLength="410"
              >
                ${TEXT}
              </text>

              <text
                x="615"
                y="140"
                transform="scale(.1)"
                fill="#fff"
                textLength="410"
              >
                ${TEXT}
              </text>
            </g>
          </svg>
          EOF

      - name: "GitHub: Push SVG"
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "chore(badge): update badges [skip ci]"

          git push