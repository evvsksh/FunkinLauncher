name: Funkin' Launcher Windows Build

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    build-windows:
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Changelog
              id: changelog
              shell: bash
              run: |
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  if [ -z "$PREVIOUS_TAG" ]; then
                    LOG=$(git log --pretty=format:"- %h - %s")
                  else
                    LOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %h - %s")
                  fi
                  echo "BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Build and Release
              uses: tauri-apps/tauri-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: build-${{ github.run_number }}
                  releaseName: "Funkin Launcher build-${{ github.run_number }}"
                  releaseBody: ${{ steps.changelog.outputs.BODY }}
                  includeRelease: true
                  args: --verbose
