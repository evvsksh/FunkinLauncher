name: CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  actions: write

jobs:
  metadata:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      changelog: ${{ steps.meta.outputs.changelog }}

    steps:
      - name: "GitHub: Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "GitHub: Generate Release Metadata"
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r '.version // empty' src-tauri/tauri.conf.json)

          if [ -z "$VERSION" ]; then
            echo "Failed to determine version"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            RANGE=""
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          echo "Generating changelog from range: $RANGE"

          {
            echo "## What's Changed"
            echo

            git log $RANGE --pretty=format:'- %s by @%an (%h)' \
              | sed 's/by @github-actions//' \
              | sort -u

            echo
            echo "## Contributors"
            echo

            git log $RANGE --format='%an' \
              | sort -u \
              | sed 's/^/- @/'

            echo

            if [ -n "$LAST_TAG" ]; then
              echo "Full Changelog: ${LAST_TAG}...v${VERSION}"
            fi
          } > RELEASE_BODY.md

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_BODY.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  check:
    needs: metadata
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"

          if [[ "$MSG" =~ ^release:\ ([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "release=true" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: "build: windows-latest"
    needs: [metadata, check]
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKGRS_DYNAMIC: 0
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/bincache,readwrite"

    steps:
      - name: "GitHub: Checkout"
        uses: actions/checkout@v4

      - name: "Rust: Restore Cache"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: "Node: Setup"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: "Rust: Install Toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: "Vcpkg: Cache"
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/packages
            vcpkg/downloads
          key: vcpkg-bin-Windows
          restore-keys: |
            vcpkg-bin-Windows

      - name: "Vcpkg: Initialize"
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg-git

          if (-Not (Test-Path vcpkg)) {
            New-Item -ItemType Directory -Path vcpkg
          }

          Copy-Item -Path "vcpkg-git\*" -Destination "vcpkg" -Recurse -Force
          .\vcpkg\bootstrap-vcpkg.bat

      - name: "Vcpkg: Install libarchive"
        shell: pwsh
        run: .\vcpkg\vcpkg install libarchive

      - name: "Vcpkg: Copy runtime DLL"
        shell: pwsh
        run: |
          Copy-Item "vcpkg\installed\x64-windows\bin\*" "src-tauri/"

      - name: "Node: Install Dependencies"
        run: npm ci

      - name: "Tauri: Build MSI"
        run: npx tauri build --bundles msi
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKGRS_DYNAMIC: 0

      - name: "GitHub: Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/msi/*.msi

  test-windows:
    name: "test: windows-latest"
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: "GitHub: Download Artifact"
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows

      - name: "MSI: Install Package"
        shell: powershell
        run: |
          $msi = Get-ChildItem windows/*.msi | Select-Object -First 1
          if (-not $msi) { exit 1 }
          Start-Process msiexec.exe -Wait -ArgumentList "/i `"$($msi.FullName)`" /qn /norestart"

      - name: "Windows: Test Application"
        shell: powershell
        run: |
          $appDir = Join-Path $Env:ProgramFiles "Funkin Launcher"
          if (-not (Test-Path $appDir)) { exit 1 }
          $exe = Get-ChildItem $appDir -Filter "*.exe" -Recurse | Where-Object { $_.Name -notmatch "uninstall|setup|update" } | Select-Object -First 1
          if (-not $exe) { exit 1 }
          $proc = Start-Process $exe.FullName -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) { exit 1 }
          Stop-Process -Id $proc.Id -Force

  build-linux:
    name: "build: ubuntu-22.04"
    needs: [metadata, check]
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.metadata.outputs.version }}

    steps:
      - name: "GitHub: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Node: Setup"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: "Rust: Setup Toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: "Rust: Restore Cache"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: "Linux: Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            elfutils \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            curl \
            file \
            pkg-config \
            build-essential \
            flatpak \
            flatpak-builder \
            libarchive-dev

      - name: "Node: Install Dependencies"
        run: npm ci

      - name: "Tauri: Build DEB"
        run: |
          touch src-tauri/archive.dll
          npx tauri build --bundles deb

      - name: "Linux: Setup Flatpak"
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: "Flatpak: Cache"
        uses: actions/cache@v4
        with:
          path: |
            .flatpak-builder/cache
          key: flatpak-${{ runner.os }}-${{ hashFiles('flatpak.yml') }}

      - name: "Flatpak: Build Package"
        run: |
          flatpak-builder --verbose --install-deps-from=flathub --user --repo=repo build-dir flatpak.yml
          flatpak build-bundle repo \
            "it.evvsk.FunkinLauncher-${VERSION}.flatpak" \
            it.evvsk.FunkinLauncher

      - name: "Upload Flatpak"
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: "it.evvsk.FunkinLauncher-*.flatpak"

  test-linux:
    name: "test: ubuntu-22.04"
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: "GitHub: Download Artifact"
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts

      - name: "Flatpak: Install Runtime"
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak xvfb

      - name: "Flatpak: Install App"
        run: |
          FILE=$(find artifacts -name "*.flatpak" | head -n 1)
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y "$FILE"

      - name: "Flatpak: Test Application"
        run: |
          xvfb-run --auto-servernum flatpak --user run it.evvsk.FunkinLauncher &
          PID=$!
          sleep 5

          if kill -0 $PID 2>/dev/null; then
            kill $PID
          else
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: [metadata, check, test-linux, test-windows]
    steps:
      - name: "GitHub: Download Linux Artifact"
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: linux

      - name: "GitHub: Download Windows Artifact"
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows

      - name: "GitHub: Handle Git Tag (Release Only)"
        if: needs.check.outputs.release == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          TAG="v${{ needs.check.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: "GitHub: Publish Prerelease (Dev)"
        if: needs.check.outputs.release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Development Build"
          prerelease: true
          files: |
            linux/it.evvsk.FunkinLauncher-*.flatpak
            windows/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "GitHub: Publish Production Release"
        if: needs.check.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: v${{ needs.check.outputs.version }}
          body: ${{ needs.metadata.outputs.changelog }}
          generate_release_notes: true
          files: |
            linux/it.evvsk.FunkinLauncher-*.flatpak
            windows/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "GitHub: Cleanup Artifacts"
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            windows-build
            linux-build
