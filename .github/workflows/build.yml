name: CI Build

on:
    workflow_dispatch:
    push:
        branches: [main]

env:
    ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
    contents: write
    actions: write
    packages: write

jobs:
    metadata:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              run: |
                  VERSION=$(jq -r '.version // empty' src-tauri/tauri.conf.json)
                  if [ -z "$VERSION" ]; then exit 1; fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  LOG=$(git log -n 25 --pretty=format:"- %h - %s")
                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    container:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - id: hash
              run: echo "hash=$(sha256sum ci.Dockerfile | cut -d' ' -f1)" >> $GITHUB_OUTPUT

            - uses: actions/cache@v4
              id: docker-cache
              with:
                  path: /tmp/docker-built
                  key: docker-${{ steps.hash.outputs.hash }}

            - id: check
              run: |
                  if [ -f /tmp/docker-built/state ]; then
                    echo "skip=true" >> $GITHUB_OUTPUT
                  else
                    echo "skip=false" >> $GITHUB_OUTPUT
                  fi

            - if: steps.check.outputs.skip != 'true'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - if: steps.check.outputs.skip != 'true'
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker-container

            - if: steps.check.outputs.skip != 'true'
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ci.Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/funkinlauncher-linux:latest
                      ghcr.io/${{ github.repository_owner }}/funkinlauncher-linux:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - if: steps.check.outputs.skip != 'true'
              run: |
                  mkdir -p /tmp/docker-built
                  touch /tmp/docker-built/state

    build-windows:
        needs: metadata
        runs-on: windows-latest
        env:
            VERSION: ${{ needs.metadata.outputs.version }}

        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: ./src-tauri

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: rustup default stable

            - run: npm ci

            - run: npx tauri build --bundles msi

            - uses: actions/upload-artifact@v4
              with:
                  name: windows-build
                  path: src-tauri/target/release/bundle/msi/*.msi

    build-linux:
        needs: [metadata, container]
        runs-on: ubuntu-22.04

        container:
            image: ghcr.io/evvsksh/funkinlauncher-linux:latest

        env:
            VERSION: ${{ needs.metadata.outputs.version }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: rustup default stable

            - run: npm ci

            - run: npx tauri build

            - run: |
                  rm -rf build-dir repo .flatpak-builder

                  flatpak remote-add --if-not-exists flathub \
                      https://flathub.org/repo/flathub.flatpakrepo

                  flatpak-builder \
                      --force-clean \
                      --disable-rofiles-fuse \
                      --repo=repo \
                      build-dir \
                      flatpak.json

                  flatpak build-bundle \
                      repo \
                      "Funkin.Launcher_${VERSION}.flatpak" \
                      it.evvsk.FunkinLauncher

            - uses: actions/upload-artifact@v4
              with:
                  name: linux-build
                  path: "*.flatpak"

    test-windows:
        needs: build-windows
        runs-on: windows-latest

        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: windows-build
                  path: windows

            - shell: powershell
              run: |
                  $msi = Get-ChildItem windows/*.msi | Select-Object -First 1

                  if (-not $msi) {
                      Write-Error "MSI not found"
                      exit 1
                  }

                  Start-Process msiexec.exe -Wait -ArgumentList "/i `"$($msi.FullName)`" /qn /norestart"

            - shell: powershell
              run: |
                  # Replace "YourAppName" with your actual install folder
                  $appDir = Join-Path $Env:ProgramFiles "YourAppName"

                  if (-not (Test-Path $appDir)) {
                      Write-Error "App directory not found: $appDir"
                      exit 1
                  }

                  $exe = Get-ChildItem $appDir -Filter "*.exe" -Recurse |
                      Where-Object { $_.Name -notmatch "uninstall|setup|update" } |
                      Select-Object -First 1

                  if (-not $exe) {
                      Write-Error "Application EXE not found"
                      exit 1
                  }

                  Write-Host "Launching $($exe.FullName)"

                  $proc = Start-Process $exe.FullName -PassThru

                  Start-Sleep -Seconds 15

                  if ($proc.HasExited) {
                      Write-Error "Application exited early"
                      exit 1
                  }

                  Stop-Process -Id $proc.Id -Force

    test-linux:
        needs: build-linux
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: linux-build
                  path: artifacts

            - run: |
                  FILE=$(find artifacts -name "*.flatpak" | head -n 1)
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
                  flatpak --user install -y "$FILE"

            - run: |
                  dbus-run-session -- xvfb-run -a flatpak run it.evvsk.FunkinLauncher &
                  PID=$!
                  sleep 15
                  kill $PID

    release:
        needs: [metadata, test-linux, test-windows]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: linux-build
                  path: linux

            - uses: actions/download-artifact@v4
              with:
                  name: windows-build
                  path: windows

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.metadata.outputs.version }}
                  body: ${{ needs.metadata.outputs.changelog }}
                  files: |
                      linux/*.flatpak
                      windows/*.msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: geekyeggo/delete-artifact@v5
              with:
                  name: |
                      linux-build
                      windows-build
