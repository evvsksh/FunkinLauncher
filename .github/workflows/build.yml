name: Funkin' Launcher Windows Build

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.VERSION }}
            changelog: ${{ steps.meta.outputs.CHANGELOG }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - id: meta
              shell: bash
              run: |
                  VERSION="build-$(git rev-parse --short HEAD)"
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  LOG=$(git log ${PREVIOUS_TAG:+$PREVIOUS_TAG..}HEAD --pretty=format:"- %h - %s")
                  echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    build:
        needs: prepare
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: windows-latest
        permissions:
            contents: write
        env:
            RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
            CARGO_NET_GIT_FETCH_WITH_CLI: "true"
            CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"

        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Crate Fetch
              shell: bash
              run: cargo fetch --locked

            - name: Install & Build
              run: |
                  npm install
                  npx tauri build --bundles msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.prepare.outputs.version }}
                  name: Funkin Launcher ${{ needs.prepare.outputs.version }}
                  body: ${{ needs.prepare.outputs.changelog }}
                  files: src-tauri/target/release/bundle/msi/*.msi
                  make_latest: false
                  prerelease: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
