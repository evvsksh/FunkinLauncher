name: Funkin Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write

env:
    CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
    CARGO_INCREMENTAL: 0

jobs:
    metadata:
        if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              shell: bash
              run: |
                  echo "version=dev" >> $GITHUB_OUTPUT
                  PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  LOG=$(git log ${PREV:+$PREV..}HEAD --pretty=format:"- %h - %s")
                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  name: Funkin' Launcher Dev Build
                  body: ${{ steps.meta.outputs.changelog }}
                  prerelease: true
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-windows:
        needs: metadata
        if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions-rust-lang/setup-rust-toolchain@v1

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm install --no-audit --no-fund

            - run: npx tauri build --bundles msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: src-tauri/target/release/bundle/msi/*.msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-linux:
        needs: metadata
        if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions-rust-lang/setup-rust-toolchain@v1

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: |
                  sudo apt-get update
                  sudo apt-get install --no-install-recommends -y \
                    libwebkit2gtk-4.1-dev \
                    build-essential \
                    libssl-dev \
                    libgtk-3-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libfuse2

            - run: npm install --no-audit --no-fund

            - run: |
                  set -e

                  rm -rf src-tauri/target/release/bundle || true

                  npx tauri build --bundles appimage

                  BASE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n 1)

                  PACKAGE="${BASE%.AppImage}-package.AppImage"
                  SYSTEM="${BASE%.AppImage}-system.AppImage"

                  cp "$BASE" "$PACKAGE"
                  cp "$BASE" "$SYSTEM"

                  chmod +x "$SYSTEM"

                  "$SYSTEM" --appimage-extract

                  rm -rf squashfs-root/usr/lib/libEGL* \
                         squashfs-root/usr/lib/libGL* \
                         squashfs-root/usr/lib/libGLX* \
                         squashfs-root/usr/lib/libGLdispatch* \
                         squashfs-root/usr/lib/libgbm*

                  curl -L -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
                  chmod +x appimagetool

                  ./appimagetool squashfs-root "$SYSTEM"

                  chmod +x "$PACKAGE" "$SYSTEM"

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: |
                      src-tauri/target/release/bundle/appimage/*-package.AppImage
                      src-tauri/target/release/bundle/appimage/*-system.AppImage
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

