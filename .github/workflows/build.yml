name: Funkin' Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write

env:
    RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
    CARGO_INCREMENTAL: 0

jobs:
    metadata:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              shell: bash
              run: |
                  echo "version=dev" >> $GITHUB_OUTPUT
                  PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  LOG=$(git log ${PREV:+$PREV..}HEAD --pretty=format:"- %h - %s")
                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  name: Funkin' Launcher Dev Build
                  body: ${{ steps.meta.outputs.changelog }}
                  prerelease: true
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: metadata
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [windows-latest, ubuntu-latest]

        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions-rust-lang/setup-rust-toolchain@v1

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install Linux deps
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt update
                  sudo apt install -y \
                    libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    git \
                    wget \
                    file \
                    libssl-dev \
                    libgtk-3-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libfuse2

            - name: Install JS deps
              run: npm install --no-audit --no-fund

            - name: Build Windows
              if: matrix.os == 'windows-latest'
              run: npx tauri build --bundles msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Release Windows
              if: matrix.os == 'windows-latest'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: src-tauri/target/release/bundle/msi/*.msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Linux
              if: matrix.os == 'ubuntu-latest'
              run: npx tauri build --bundles appimage
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Release Linux
              if: matrix.os == 'ubuntu-latest'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: src-tauri/target/release/bundle/appimage/*.AppImage
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
