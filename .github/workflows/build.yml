name: Funkin Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    metadata:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              run: |
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

                  DATE=$(curl -s https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest | jq -r .published_at)

                  LOG=$(git log -n 10 --pretty=format:"- %h - %s")

                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    build-windows:
        needs: metadata
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: npm install @tauri-apps/cli
              env:
                  npm_config_optional: true

            - run: npx tauri build --bundles msi

    build-linux:
        needs: metadata
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/cache@v4
              with:
                  path: /var/cache/apt
                  key: apt-cache-${{ runner.os }}

            - run: |
                  sudo rm -rf /var/lib/apt/lists/*
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    flatpak \
                    flatpak-builder \
                    jq \
                    pkg-config \
                    build-essential \
                    binutils \
                    elfutils \
                    libssl-dev \
                    libgtk-3-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libwebkit2gtk-4.1-dev \
                    libjavascriptcoregtk-4.1-dev
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci --no-audit --no-fund

            - run: npx tauri build

            - run: |
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

            - run: |
                  set -e

                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)

                  test -f src-tauri/target/release/funkinlauncher
                  test -f flatpak/it.evvsk.FunkinLauncher.json

                  flatpak-builder --user \
                    --force-clean \
                    --install-deps-from=flathub \
                    --repo=repo \
                    build-dir \
                    flatpak/it.evvsk.FunkinLauncher.json

                  flatpak build-bundle repo \
                    "Funkin.Launcher_${VERSION}.flatpak" \
                    it.evvsk.FunkinLauncher

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: Funkin.Launcher_*.flatpak
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
