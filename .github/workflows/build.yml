name: Funkin Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write

env:
    CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
    CARGO_INCREMENTAL: 0

jobs:
    metadata:
        if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              run: |
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

                  DATE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                    https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest \
                    | jq -r .published_at)

                  if [ "$DATE" = "null" ] || [ -z "$DATE" ]; then
                    LOG=$(git log -n 30 --pretty=format:"- %h - %s")
                  else
                    LOG=$(git log --since="$DATE" --pretty=format:"- %h - %s")
                  fi

                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  name: Funkin' Launcher Dev Build
                  body: ${{ steps.meta.outputs.changelog }}
                  prerelease: true
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-windows:
        needs: metadata
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - uses: dtolnay/rust-toolchain@stable

            - run: npm install --no-audit --no-fund

            - run: npx tauri build --bundles msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: src-tauri/target/release/bundle/msi/*.msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-linux:
        needs: metadata
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - uses: dtolnay/rust-toolchain@stable

            - run: |
                  sudo apt-get update -y
                  sudo apt-get install -y --no-install-recommends \
                    libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl wget file jq \
                    libxdo-dev libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    flatpak flatpak-builder

                  flatpak --user remote-add --if-not-exists flathub \
                    https://flathub.org/repo/flathub.flatpakrepo

            - run: |
                  set -e

                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)

                  flatpak-builder --user \
                    --disable-rofiles-fuse \
                    --install-deps-from=flathub \
                    --repo=repo \
                    --force-clean \
                    build-dir \
                    flatpak/it.evvsk.funkinlauncher.json

                  flatpak build-bundle repo \
                    "Funkin.Launcher_${VERSION}.flatpak" \
                    it.evvsk.FunkinLauncher

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: Funkin.Launcher_*.flatpak
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
