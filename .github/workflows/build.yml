name: Funkin Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    metadata:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              run: |
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

                  DATE=$(curl -s https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest | jq -r .published_at)

                  if [ "$DATE" = "null" ] || [ -z "$DATE" ]; then
                    LOG=$(git log -n 10 --pretty=format:"- %h - %s")
                  else
                    LOG=$(git log --since="$DATE" --pretty=format:"- %h - %s")
                  fi

                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    build-windows:
        needs: metadata
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci --no-audit --no-fund
            - run: npx tauri build --bundles msi

    build-linux:
        needs: metadata
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci --no-audit --no-fund

            - run: npx tauri build

            - run: |
                  sudo apt-get update
                  sudo apt-get install -y flatpak flatpak-builder jq

            - run: |
                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

            - run: |
                  set -e
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)

                  mkdir -p flatpak-build
                  cp -r src-tauri/target/release/bundle/* flatpak-build/ || true
                  cp -r src-tauri/target/release/funkin-launcher flatpak-build/ || true

                  flatpak-builder --user \
                    --force-clean \
                    --install-deps-from=flathub \
                    --repo=repo \
                    build-dir \
                    flatpak/it.evvsk.FunkinLauncher.json

                  flatpak build-bundle repo \
                    "Funkin.Launcher_${VERSION}.flatpak" \
                    it.evvsk.FunkinLauncher

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: Funkin.Launcher_*.flatpak
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
