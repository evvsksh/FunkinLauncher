name: Funkin' Launcher Windows Build

on:
    workflow_dispatch:
    push:
        branches: [main]

jobs:
    metadata:
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.VERSION }}
            changelog: ${{ steps.meta.outputs.CHANGELOG }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - id: meta
              shell: bash
              run: |
                  VERSION="build-$(git rev-parse --short HEAD)"
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  LOG=$(git log ${PREVIOUS_TAG:+$PREVIOUS_TAG..}HEAD --pretty=format:"- %h - %s")
                  echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    build:
        needs: metadata
        runs-on: windows-latest
        env:
            RUSTFLAGS: "-C link-arg=-fuse-ld=lld -Zincremental-info"
            CARGO_NET_GIT_FETCH_WITH_CLI: "true"
            CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
            CARGO_INCREMENTAL: 0
        steps:
            - uses: actions/checkout@v4

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install & Build
              shell: bash
              run: |
                  npm install --no-audit --no-fund
                  npx tauri build --bundles msi -v
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload MSI
              uses: actions/upload-artifact@v4
              with:
                  name: funkin-launcher-msi
                  path: src-tauri/target/release/bundle/msi/*.msi

    release:
        needs: [metadata, build]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download MSI
              uses: actions/download-artifact@v4
              with:
                  name: funkin-launcher-msi
                  path: release-artifacts

            - name: GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.metadata.outputs.version }}
                  name: Funkin Launcher ${{ needs.metadata.outputs.version }}
                  body: ${{ needs.metadata.outputs.changelog }}
                  files: release-artifacts/*.msi
                  make_latest: false
                  prerelease: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
