name: Funkin Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write
    actions: write

jobs:
    metadata:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              run: |
                  VERSION=$(jq -r '.version // empty' src-tauri/tauri.conf.json)
                  if [ -z "$VERSION" ]; then exit 1; fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  LOG=$(git log -n 25 --pretty=format:"- %h - %s")
                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

    build-windows:
        needs: metadata
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci

            - run: npx tauri build --bundles msi

            - uses: actions/upload-artifact@v4
              with:
                  name: windows-build
                  path: src-tauri/target/release/bundle/msi/*.msi

    build-linux:
        needs: metadata
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - uses: dtolnay/rust-toolchain@stable

            - run: |
                  sudo rm -rf /var/lib/apt/lists/*
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    flatpak \
                    flatpak-builder \
                    jq \
                    pkg-config \
                    build-essential \
                    binutils \
                    elfutils \
                    libssl-dev \
                    libgtk-3-dev \
                    libgtk-3-0 \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libwebkit2gtk-4.1-dev \
                    libjavascriptcoregtk-4.1-dev \
                    libcanberra-gtk-module \
                    libcanberra-gtk3-module

                  flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

                  flatpak --user install -y flathub org.gnome.Sdk//48 org.gnome.Platform//48

            - run: npm ci

            - run: npx tauri build

            - run: |
                  VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
                  rm -rf build-dir repo
                  flatpak-builder --user --force-clean --repo=repo build-dir flatpak/it.evvsk.FunkinLauncher.json
                  flatpak build-bundle repo "Funkin.Launcher_${VERSION}.flatpak" it.evvsk.FunkinLauncher

            - uses: actions/upload-artifact@v4
              with:
                  name: linux-build
                  path: "*.flatpak"

    release:
        needs: [metadata, build-linux, build-windows]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: linux-build

            - uses: actions/download-artifact@v4
              with:
                  name: windows-build

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.metadata.outputs.version }}
                  body: ${{ needs.metadata.outputs.changelog }}
                  files: |
                      *.flatpak
                      *.msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: geekyeggo/delete-artifact@v5
              with:
                  name: |
                      linux-build
                      windows-build
