name: Funkin' Launcher Build

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: write

env:
    CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
    CARGO_INCREMENTAL: 0

jobs:
    metadata:
        if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            changelog: ${{ steps.meta.outputs.changelog }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: meta
              shell: bash
              run: |
                  echo "version=dev" >> $GITHUB_OUTPUT
                  PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
                  LOG=$(git log ${PREV:+$PREV..}HEAD --pretty=format:"- %h - %s")
                  echo "changelog<<EOF" >> $GITHUB_OUTPUT
                  echo "$LOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  name: Funkin' Launcher Dev Build
                  body: ${{ steps.meta.outputs.changelog }}
                  prerelease: true
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: metadata
        if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [windows-latest, ubuntu-22.04, macos-latest]

        steps:
            - uses: actions/checkout@v4

            - uses: Swatinem/rust-cache@v2
              with:
                  work-dir: src-tauri

            - uses: actions-rust-lang/setup-rust-toolchain@v1

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install Linux deps
              if: matrix.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install --no-install-recommends -y \
                    libwebkit2gtk-4.1-dev \
                    build-essential \
                    libssl-dev \
                    libgtk-3-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libfuse2

            - name: Install JS deps
              run: npm install --no-audit --no-fund

            - name: Build Windows
              if: matrix.os == 'windows-latest'
              run: npx tauri build --bundles msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Release Windows
              if: matrix.os == 'windows-latest'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: src-tauri/target/release/bundle/msi/*.msi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Linux
              if: matrix.os == 'ubuntu-22.04'
              shell: bash
              run: |
                  set -e
                  npx tauri build --bundles appimage
                  APP=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n 1)
                  echo "Built AppImage: $APP"
                  chmod +x "$APP"
                  "$APP" --appimage-extract
                  test -d squashfs-root || (echo "AppImage extraction failed" && exit 1)

                  rm -f squashfs-root/usr/lib/libEGL* || true
                  rm -f squashfs-root/usr/lib/libGL* || true
                  rm -f squashfs-root/usr/lib/libGLX* || true
                  rm -f squashfs-root/usr/lib/libGLdispatch* || true
                  rm -f squashfs-root/usr/lib/libdrm* || true
                  rm -f squashfs-root/usr/lib/libgbm* || true
                  rm -f squashfs-root/usr/lib/libwayland* || true

                  curl -L -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
                  chmod +x appimagetool
                  file appimagetool
                  ./appimagetool squashfs-root Funkin.tmp.AppImage
                  mv -f Funkin.tmp.AppImage "$APP"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  WEBKIT_DISABLE_DMABUF_RENDERER: "1"
                  WEBKIT_DISABLE_COMPOSITING_MODE: "1"
                  GDK_BACKEND: "x11"

            - name: Release Linux
              if: matrix.os == 'ubuntu-22.04'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: dev
                  files: |
                      src-tauri/target/release/bundle/appimage/*.AppImage
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # - name: Build macOS
            #   if: matrix.os == 'macos-latest'
            #   run: npx tauri build --bundles dmg
            #   env:
            #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

