name: Generate Screenshot

on:
    workflow_dispatch:
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: write

jobs:
    screenshot:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm install

            - run: npm install -D playwright

            - run: npm run build

            - run: npx playwright install --with-deps

            - run: |
                  npm run preview -- --port 5173 &

                  node -e "
                  const http = require('http');
                  const fs = require('fs');

                  const waitForServer = () => new Promise((resolve) => {
                    const check = () => {
                      http.get('http://localhost:5173', (res) => {
                        if (res.statusCode === 200) return resolve();
                        setTimeout(check, 300);
                      }).on('error', () => setTimeout(check, 300));
                    };
                    check();
                  });

                  waitForServer().then(() => {
                    fs.writeFileSync('.server-ready', 'ok');
                  });
                  "

            - run: |
                  while [ ! -f .server-ready ]; do
                    sleep 0.1
                  done

            - run: |
                  mkdir -p assets
                  node -e "
                  const { chromium } = require('playwright');

                  (async () => {
                    const browser = await chromium.launch();
                    const page = await browser.newPage({
                      viewport: { width: 950, height: 600 }
                    });

                    const url = 'http://localhost:5173';
                    const maxRetries = 3;

                    async function getBrokenImages() {
                      return await page.evaluate(() => {
                        const imgs = Array.from(document.images);
                        return imgs
                          .filter(img => !img.complete || img.naturalWidth === 0)
                          .map(img => img.src);
                      });
                    }

                    let broken = [];

                    for (let i = 0; i < maxRetries; i++) {
                      await page.goto(url, { waitUntil: 'domcontentloaded' });
                      await page.waitForTimeout(2000);

                      broken = await getBrokenImages();

                      if (broken.length === 0) break;

                      console.log('Retry ' + (i + 1) + '/' + maxRetries + ' - broken images:', broken);

                      await page.reload({ waitUntil: 'domcontentloaded' });
                      await page.waitForTimeout(2000);
                    }

                    broken = await getBrokenImages();

                    if (broken.length > 0) {
                      await browser.close();
                      throw new Error(
                        'Aborting: ' + broken.length + ' image(s) failed after ' + maxRetries + ' retries'
                      );
                    }

                    await page.waitForTimeout(1000);

                    await page.screenshot({
                      path: 'assets/background.png'
                    });

                    await browser.close();
                  })();
                  "

            - name: Update Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release view assets >/dev/null 2>&1 || gh release create assets --title "Assets" --notes "The following files are generated automatically. Please don't change them manually or they will be overwritten." --latest

                  gh release edit assets \
                    --title "Assets" \
                    --notes "The following files are generated automatically. Please don't change them manually or they will be overwritten." \
                    --latest

                  gh release upload assets assets/background.png --clobber
