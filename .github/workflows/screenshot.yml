name: Generate Screenshot

on:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    screenshot:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm install

            - run: npm install -D playwright

            - run: npm run build

            - run: npx playwright install --with-deps

            - run: |
                  npm run preview -- --port 5173 &

                  node -e "
                  const http = require('http');
                  const fs = require('fs');

                  const waitForServer = () => new Promise((resolve) => {
                    const check = () => {
                      http.get('http://localhost:5173', (res) => {
                        if (res.statusCode === 200) return resolve();
                        setTimeout(check, 300);
                      }).on('error', () => setTimeout(check, 300));
                    };
                    check();
                  });

                  waitForServer().then(() => {
                    fs.writeFileSync('.server-ready', 'ok');
                  });
                  "

            - run: |
                  while [ ! -f .server-ready ]; do
                    sleep 0.1
                  done

            - run: |
                  mkdir -p assets
                  node -e "
                  const { chromium } = require('playwright');

                  (async () => {
                    const browser = await chromium.launch();
                    const page = await browser.newPage({
                      viewport: { width: 1920, height: 1080 }
                    });

                    await page.goto('http://localhost:5173');
                    await page.waitForLoadState('networkidle');

                    await page.screenshot({
                      path: 'assets/background.png'
                    });

                    await browser.close();
                  })();
                  "

            - name: Update Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release view assets || gh release create assets --title "Assets" --notes "Auto-generated screenshot" --latest

                  gh release upload assets assets/background.png \
                    --clobber
